global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "xaf-app"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["host.docker.internal:5000"]
        labels:
          app: "xafgrafana"

  - job_name: "sql-exporter"
    static_configs:
      - targets: ["sql-exporter:9399"]
        labels:
          app: "sqlserver"
